    />
    <title>Tech Titans Lab</title>
    <script>
      // Set the theme before first paint so there's no light-mode flash for
      // returning dark-mode users.
      (function () {
        var stored = localStorage.getItem("codelab.theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
